name: pipeline

# AI Semiconductor Cycle Intelligence pipeline.
# Schedule:
#   - 21:00 UTC daily (06:00 KST)
#
# Sends Telegram reports only on the scheduled Saturday 06:00 KST run.

on:
  schedule:
    - cron: "0 21 * * *"      # daily 06:00 KST report data refresh
  workflow_dispatch:          # manual trigger, no Telegram by default

concurrency:
  group: asci-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Determine Telegram delivery
        id: telegram_gate
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(TZ=Asia/Seoul date +%u)" = "6" ]; then
            echo "send=true" >> "$GITHUB_OUTPUT"
            echo "Telegram report enabled for Saturday 06:00 KST"
          else
            echo "send=false" >> "$GITHUB_OUTPUT"
            echo "Telegram report disabled for this run"
          fi

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Resolve Pages URL
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "PAGES_URL=$PAGES_URL" >> $GITHUB_ENV

      - name: Run pipeline
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_TELEGRAM:    ${{ steps.telegram_gate.outputs.send }}
          FRED_API_KEY:     ${{ secrets.FRED_API_KEY }}
          PAGES_URL:        ${{ env.PAGES_URL }}
          TZ: "Asia/Seoul"
        run: |
          if [ "$SEND_TELEGRAM" != "true" ]; then
            unset TELEGRAM_TOKEN TELEGRAM_CHAT_ID
          fi
          python scripts/run_pipeline.py

      - name: Refresh historical backtest (daily only)
        if: github.event.schedule == '0 21 * * *' || github.event_name == 'workflow_dispatch'
        run: python scripts/backtest.py
        continue-on-error: true   # backtest failure shouldn't block deployment

      - name: Commit JSON artifacts
        run: |
          git config user.name  "asci-bot[bot]"
          git config user.email "asci-bot[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: pipeline update $(date -u '+%Y-%m-%dT%H:%MZ')"
            git push
          fi

      - name: Stage data JSON for Pages
        run: |
          mkdir -p docs/site/data
          cp -r data/* docs/site/data/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/site
          name: github-pages

      - name: Notify on failure
        if: failure() && steps.telegram_gate.outputs.send == 'true'
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import os, requests
          t = os.environ.get("TELEGRAM_TOKEN", "")
          c = os.environ.get("TELEGRAM_CHAT_ID", "")
          if t and c:
              requests.post(
                  f"https://api.telegram.org/bot{t}/sendMessage",
                  json={"chat_id": c,
                        "text": "❌ ASCI pipeline failed.\nCheck: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"},
                  timeout=10)
          EOF

  deploy:
    needs: ingest
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
